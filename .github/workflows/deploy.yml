name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/last24bcn
            sudo chown -R $USER:$USER /var/www/last24bcn
            cd /var/www/last24bcn
            if [ ! -d ".git" ]; then
              git clone https://github.com/inspedralbes/tr3-cinema-24-25-a24jauhurgon.git .
            fi
            git fetch origin
            git reset --hard origin/main
            # Generar fitxer .env real al servidor perquè sigui persistent
            echo "APP_KEY=${{ secrets.APP_KEY }}" > backend/.env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> backend/.env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> backend/.env
            echo "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> backend/.env
            echo "MAIL_PORT=${{ secrets.MAIL_PORT }}" >> backend/.env
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> backend/.env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> backend/.env
            echo "MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}" >> backend/.env
            echo "MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}" >> backend/.env
            echo "APP_ENV=production" >> backend/.env
            echo "APP_DEBUG=false" >> backend/.env
            echo "LOG_CHANNEL=single" >> backend/.env
            echo "SESSION_SECURE_COOKIE=true" >> backend/.env
            echo "DB_CONNECTION=mysql" >> backend/.env
            echo "DB_HOST=db" >> backend/.env
            echo "DB_PORT=3306" >> backend/.env
            echo "DB_DATABASE=ultimahorabcn_db" >> backend/.env
            echo "DB_USERNAME=root" >> backend/.env
            echo "DB_PASSWORD=password" >> backend/.env
            echo "FRONTEND_URL=https://last24bcn.daw.inspedralbes.cat" >> backend/.env
            echo "CORS_ALLOWED_ORIGINS=https://last24bcn.daw.inspedralbes.cat" >> backend/.env
            echo "APP_URL=https://last24bcn.daw.inspedralbes.cat" >> backend/.env
            echo "GOOGLE_REDIRECT_URI=https://last24bcn.daw.inspedralbes.cat/api/auth/google/callback" >> backend/.env

            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build
            
            echo "--- ESPERANT QUE EL BACKEND I DB ESTIGUIN LLESTOS ---"
            sleep 15
            
            docker exec last24_backend php artisan migrate --force --no-interaction
            docker exec last24_backend php artisan db:seed --force --no-interaction
            docker exec last24_backend php artisan config:clear
            docker exec last24_backend php artisan cache:clear
            docker exec last24_backend php artisan view:clear
            docker exec last24_backend php artisan route:cache
            docker exec last24_backend php artisan config:cache
            echo "--- ESTAT DELS CONTENIDORS ---"
            docker ps
            echo "--- LOGS DEL BACKEND (ÚLTIMS 10) ---"
            docker logs last24_backend --tail 10
            echo "--- LOGS DEL FRONTEND ---"
            docker logs last24_frontend --tail 10
