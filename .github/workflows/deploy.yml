name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/last24bcn
            sudo chown -R $USER:$USER /var/www/last24bcn
            cd /var/www/last24bcn
            if [ ! -d ".git" ]; then
              git clone https://github.com/inspedralbes/tr3-cinema-24-25-a24jauhurgon.git .
            fi
            git fetch origin
            git checkout main
            # Generar fitxer .env real al servidor perquè sigui persistent
            echo "APP_KEY=${{ secrets.APP_KEY }}" > .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            echo "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> .env
            echo "MAIL_PORT=${{ secrets.MAIL_PORT }}" >> .env
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
            echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            echo "MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}" >> .env
            echo "MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=ultimahorabcn_db" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=password" >> .env
            echo "FRONTEND_URL=https://last24bcn.daw.inspedralbes.cat" >> .env
            echo "CORS_ALLOWED_ORIGINS=https://last24bcn.daw.inspedralbes.cat" >> .env
            echo "APP_URL=https://last24bcn.daw.inspedralbes.cat" >> .env
            echo "GOOGLE_REDIRECT_URI=https://last24bcn.daw.inspedralbes.cat/api/auth/google/callback" >> .env

            docker compose -f docker-compose.prod.yml down --remove-orphans
            docker compose -f docker-compose.prod.yml up -d --build
            docker exec last24_backend php artisan migrate --force
            docker exec last24_backend php artisan db:seed --force
            docker exec last24_backend php artisan config:cache
            docker exec last24_backend php artisan route:cache
            echo "--- ESTAT DELS CONTENIDORS ---"
            docker ps
            echo "--- LOGS DEL BACKEND (ÚLTIMS 30) ---"
            docker logs last24_backend --tail 30
            echo "--- LOGS DEL FRONTEND ---"
            docker logs last24_frontend --tail 20
