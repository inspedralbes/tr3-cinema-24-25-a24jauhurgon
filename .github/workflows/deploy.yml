name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo mkdir -p /var/www/cinema
            sudo chown -R $USER:$USER /var/www/cinema
            cd /var/www/cinema
            if [ ! -d ".git" ]; then
              git clone https://github.com/inspedralbes/tr3-cinema-24-25-a24jauhurgon.git .
            fi
            git fetch origin
            git checkout main
            git pull origin main
            export APP_KEY="${{ secrets.APP_KEY }}"
            export GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            export GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            export MAIL_HOST="${{ secrets.MAIL_HOST }}"
            export MAIL_PORT="${{ secrets.MAIL_PORT }}"
            export MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}"
            export MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"
            export MAIL_ENCRYPTION="${{ secrets.MAIL_ENCRYPTION }}"
            export MAIL_FROM_ADDRESS="${{ secrets.MAIL_FROM_ADDRESS }}"
            docker compose -f docker-compose.prod.yml up -d --build
            docker exec last24_backend php artisan migrate --force
            docker exec last24_backend php artisan db:seed --force
            docker exec last24_backend php artisan config:cache
            docker exec last24_backend php artisan route:cache
            echo "--- ESTAT DELS CONTENIDORS ---"
            docker ps
            echo "--- LOGS DEL FRONTEND ---"
            docker logs last24_frontend --tail 20
