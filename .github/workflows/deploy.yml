name: Deploy to Production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ~/tr3-cinema-24-25-a24jauhurgon
            git checkout prod
            git pull origin prod
            docker-compose -f docker-compose.prod.yml up -d --build
            docker exec last24_backend php artisan migrate --force
            docker exec last24_backend php artisan db:seed --force
            docker exec last24_backend php artisan config:cache
            docker exec last24_backend php artisan route:cache
            docker exec last24_backend php artisan view:cache
