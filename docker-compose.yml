version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: last24_db
    restart: unless-stopped
    ports:
      - "33060:3306"
    environment:
      MYSQL_DATABASE: ultimahorabcn_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - last24_dbdata:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: last24_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ultimahorabcn_db
      DB_USERNAME: root
      DB_PASSWORD: password
      FRONTEND_URL: http://localhost:5173
      SOCKET_SERVER_URL: http://socket:3001
    depends_on:
      - db

  socket:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    container_name: last24_socket
    restart: unless-stopped
    ports:
      - "3001:3001" # WebSocket (Socket.IO)
      - "3002:3002" # API interna (per backend Laravel)
    volumes:
      - ./socket-server:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: last24_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
      - "5174:5174" # Typical fallback or Cypress port if needed
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
      - socket

volumes:
  last24_dbdata:
