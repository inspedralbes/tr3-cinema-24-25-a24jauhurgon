version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: last24_db
    restart: unless-stopped
    ports:
      - "33065:3306"
    environment:
      MYSQL_DATABASE: ultimahorabcn_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - last24_dbdata:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: last24_backend
    restart: unless-stopped
    ports:
      - "8055:8000"
    environment:
      APP_KEY: ${APP_KEY}
      APP_DEBUG: "false"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ultimahorabcn_db
      DB_USERNAME: root
      DB_PASSWORD: password
      FRONTEND_URL: https://last24bcn.daw.inspedralbes.cat
      CORS_ALLOWED_ORIGINS: https://last24bcn.daw.inspedralbes.cat
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: https://last24bcn.daw.inspedralbes.cat/api/auth/google/callback
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
    depends_on:
      - db

  socket:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    container_name: last24_socket
    restart: unless-stopped
    ports:
      - "3055:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_SOCKET_URL: /
    container_name: last24_frontend
    restart: unless-stopped
    ports:
      - "5055:80"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
      - socket

volumes:
  last24_dbdata:
