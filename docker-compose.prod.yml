version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: last24_db
    restart: unless-stopped
    ports:
      - "33065:3306"
    environment:
      MYSQL_DATABASE: ultimahorabcn_db
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - last24_dbdata:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: last24_backend
    restart: unless-stopped
    # Ports eliminats per seguretat (només accessible via Nginx)
    volumes:
      - ./backend:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ultimahorabcn_db
      DB_USERNAME: root
      DB_PASSWORD: password
      FRONTEND_URL: https://last24bcn.daw.inspedralbes.cat:8445
      CORS_ALLOWED_ORIGINS: https://last24bcn.daw.inspedralbes.cat:8445,http://last24bcn.daw.inspedralbes.cat:8005
      GOOGLE_REDIRECT_URI: https://last24bcn.daw.inspedralbes.cat:8445/api/auth/google/callback
    depends_on:
      - db

  socket:
    build:
      context: ./socket-server
      dockerfile: Dockerfile
    container_name: last24_socket
    restart: unless-stopped
    # Ports eliminats per seguretat (només accessible via Nginx)
    volumes:
      - ./socket-server:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: last24_frontend
    restart: unless-stopped
    # Ports eliminats per seguretat (només accessible via Nginx)
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=/api
      - VITE_SOCKET_URL=/
    depends_on:
      - backend
      - socket

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: last24_nginx
    restart: unless-stopped
    ports:
      - "8005:80"
      - "8445:443"
    depends_on:
      - frontend
      - backend
      - socket

volumes:
  last24_dbdata:
